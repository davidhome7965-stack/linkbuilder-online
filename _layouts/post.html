---
layout: default
---
<article class="blog-section" style="max-width: 800px;">
  <div class="post-tag">{{ page.date | date: "%B %d, %Y" }}</div>
  <h1 style="font-size: 48px; margin: 20px 0; color: #fff;">{{ page.title }}</h1>
  <hr style="border: 0; border-top: 1px solid #1E293B; margin-bottom: 40px;">
  
  <div class="post-content" style="line-height: 1.8; font-size: 18px; color: #CBD5E1;">
    {{ content }}
  </div>
</article>

<style>
  .post-content h2 { color: var(--teal); margin-top: 40px; }
  .post-content p { margin-bottom: 20px; }
  .post-content ul { margin-left: 20px; margin-bottom: 20px; color: var(--coral); }
</style>
