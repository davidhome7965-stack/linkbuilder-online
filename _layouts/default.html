    /* Blog specific extra styles */
    .blog-section { padding: 120px 20px; max-width: 1200px; margin: 0 auto; }
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-top: 50px; }
    .post-card { background: #0F172A; border: 1px solid #1E293B; border-radius: 16px; padding: 30px; transition: 0.4s; position: relative; overflow: hidden; }
    .post-card:hover { border-color: var(--teal); transform: translateY(-10px); }
    .post-tag { color: var(--coral); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  </style>
