---
layout: default
title: Our Blog
---

<div class="blog-section">
  <h1 class="h-title center">Latest <span class="hl-t">SEO</span> Insights</h1>
  <p class="h-subtitle center">Read our latest articles on link building and digital growth.</p>

  <div class="blog-grid">
    {% for post in site.posts %}
    <div class="post-card">
      <div class="post-tag">{{ post.categories | first }}</div>
      <h3 style="margin: 15px 0; font-size: 24px; color: #fff;">{{ post.title }}</h3>
      <p style="color: #94A3B8; margin-bottom: 20px; line-height: 1.6;">{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
      <a href="{{ post.url | relative_url }}" style="color: var(--teal); text-decoration: none; font-weight: 700;">Read More →</a>
    </div>
    {% endfor %}
  </div>
</div>
