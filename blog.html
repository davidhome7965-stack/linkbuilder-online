---
layout: default
title: Our Blog
---

<div class="blog-section">
  <div style="text-align: center; margin-bottom: 60px;">
    <h1 class="h-title">Our <span class="hl-t">Latest</span> Articles</h1>
    <p class="h-subtitle">Expert tips and strategies to scale your SEO growth.</p>
  </div>

  <div class="blog-grid">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: inherit;">
      <div class="post-card">
        <div class="post-tag">{{ post.categories | first | default: "SEO" }}</div>
        <h3 style="margin: 15px 0; font-size: 24px; color: #fff; font-weight: 700;">{{ post.title }}</h3>
        <p style="color: #94A3B8; margin-bottom: 20px; line-height: 1.6; font-size: 15px;">
          {{ post.content | strip_html | truncatewords: 25 }}
        </p>
        <span style="color: var(--teal); font-weight: 800; font-size: 14px; text-transform: uppercase;">
          Read Full Article →
        </span>
      </div>
    </a>
    {% endfor %}
  </div>
</div>

<style>
  /* Blog layout specifically for this page */
  .blog-section { padding: 140px 20px 80px; max-width: 1200px; margin: 0 auto; }
  .blog-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
    gap: 30px; 
  }
  .post-card { 
    background: #0F172A; 
    border: 1px solid #1E293B; 
    border-radius: 20px; 
    padding: 35px; 
    height: 100%;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
  }
  .post-card:hover { 
    border-color: var(--teal); 
    transform: translateY(-12px);
    box-shadow: 0 20px 40px rgba(0, 201, 177, 0.1);
  }
  .post-tag { 
    color: var(--coral); 
    font-weight: 800; 
    font-size: 11px; 
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
</style>
