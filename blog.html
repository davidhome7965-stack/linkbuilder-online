---
layout: default
title: Our Blog
---

<div class="blog-section">
  <h1 class="h-title center">Latest <span class="hl-t">SEO</span> Insights</h1>
  
  <div class="blog-grid">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: inherit;">
      <div class="post-card">
        <div class="post-tag">{{ post.categories | first | default: "SEO" }}</div>
        <h3 style="margin: 15px 0; font-size: 24px; color: #fff;">{{ post.title }}</h3>
        <p style="color: #94A3B8; margin-bottom: 20px; line-height: 1.6;">
          {{ post.content | strip_html | truncatewords: 20 }}
        </p>
        <span style="color: var(--teal); font-weight: 700;">Read More →</span>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
